<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Sunrise Compass app icon">
  <defs>
    <linearGradient id="scbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#1b2a41"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5a8c"/>
      <stop offset="0.45" stop-color="#f2a65a"/>
      <stop offset="0.75" stop-color="#f6c667"/>
      <stop offset="1" stop-color="#fbe3a1"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="1" stop-color="#f7b955"/>
    </radialGradient>
    <clipPath id="tileclip"><rect x="405" y="255" width="390" height="390" rx="88"/></clipPath>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#scbg)"/>
  <g filter="url(#soft2)">
    <g clip-path="url(#tileclip)">
      <rect x="405" y="255" width="390" height="390" fill="url(#sky)"/>
      <circle cx="600" cy="560" r="92" fill="url(#sun)"/>
      <rect x="405" y="560" width="390" height="85" fill="#1b2a41"/>
      <!-- compass tick arc -->
      <g stroke="#fdf3d8" stroke-width="4" stroke-linecap="round" opacity="0.9">
        <line x1="470" y1="335" x2="470" y2="360"/>
        <line x1="535" y1="315" x2="535" y2="345"/>
        <line x1="600" y1="308" x2="600" y2="345"/>
        <line x1="665" y1="315" x2="665" y2="345"/>
        <line x1="730" y1="335" x2="730" y2="360"/>
      </g>
    </g>
    <rect x="405" y="255" width="390" height="390" rx="88" fill="none" stroke="#2c3e57" stroke-width="3"/>
  </g>
</svg>
