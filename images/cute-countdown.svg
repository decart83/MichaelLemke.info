<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Cute Countdown app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf3e6"/>
      <stop offset="1" stop-color="#f2e2c9"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9f0"/>
      <stop offset="1" stop-color="#f6e7cf"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#c9a86a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g filter="url(#soft)">
    <rect x="405" y="255" width="390" height="390" rx="88" fill="url(#tile)" stroke="#e7d3b1" stroke-width="2"/>
  </g>
  <!-- sparkles -->
  <g fill="#f0a04b">
    <path d="M470 320 l10 24 24 10 -24 10 -10 24 -10 -24 -24 -10 24 -10z"/>
    <path d="M726 560 l7 17 17 7 -17 7 -7 17 -7 -17 -17 -7 17 -7z"/>
  </g>
  <text x="600" y="500" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700" fill="#e07a5f">3&#183;2&#183;1</text>
  <text x="600" y="575" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" letter-spacing="6" fill="#a9713b">COUNTDOWN</text>
</svg>
